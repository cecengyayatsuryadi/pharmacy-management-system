<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid Block fulfilling the entire 100x100 canvas -->
  <!-- Using currentColor so it automatically follows the text color of its parent -->
  <rect x="0" y="0" width="100" height="100" rx="16" fill="currentColor" />
  
  <!-- Negative Space Cross (Transparent/Background color) -->
  <!-- We use stroke with a specific color or background to make it look "cut out" -->
  <path d="M50 25V75M25 50H75" stroke="canvas" stroke-width="14" stroke-linecap="square" style="stroke: var(--background, white);"/>
</svg>